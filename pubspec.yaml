name: docflow
description: "DocFlow - Smart PDF Tools. Merge, split, convert & protect PDFs."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  get: ^4.7.3
  get_storage: ^2.1.1
  file_picker: ^10.3.2
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  pdf: ^3.12.0
  printing: ^5.14.3
  syncfusion_flutter_pdf: ^33.2.13
  share_plus: ^12.0.2
  image_picker: ^1.2.2
  open_filex: ^4.7.0
  device_info_plus: ^12.4.0
  image: ^4.8.0
  pdfx: ^2.9.2
  syncfusion_flutter_pdfviewer: ^33.2.13
  pdf_combiner: ^6.0.4
  google_mobile_ads: ^5.3.0
  in_app_review: ^2.0.9
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
